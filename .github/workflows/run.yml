# 日常本地开发请用 scripts/dev-local.sh（不经 Docker/act，最快）。
# 本 workflow 用于 act / GitHub 手动复现「build + uvicorn」。
# 本地 act 示例：
#   act workflow_dispatch -W .github/workflows/run.yml -j run
# 需从宿主机访问 8000 时，按本机 act 版本配置端口映射（如 --container-options "-p 8000:8000"）。

name: Run local server

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libsndfile1 libchromaprint-tools

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        working-directory: backend
        env:
          UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/backend/venv
        run: uv sync --frozen

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Start uvicorn
        working-directory: backend
        env:
          UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/backend/venv
        run: uv run uvicorn main:app --host 0.0.0.0 --port 8000
