# 后端 pytest + 前端 Vitest（无需 Docker / ffmpeg）

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for sensitive data patterns
        run: bash scripts/scan_sensitive_info.sh

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies (incl. dev)
        working-directory: backend
        env:
          UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/backend/venv
        run: uv sync --frozen --extra dev

      - name: Pytest
        working-directory: backend
        env:
          UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/backend/venv
        run: uv run pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Vitest
        working-directory: frontend
        run: npm run test
